<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Clicker Game</title>
    
      <style>
      .sparkle {
          position:fixed;
        width: 8px;
        height:12px;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle-fall 0.111s ease-out forwards;
}


@keyframes sparkle-fall {
    0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(var(--randomX, 0), 100px) scale(0);
        opacity: 0;
    }
}
 {
    0% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(100px) scale(0);
        opacity: 0;
    }
} body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: black;
            color: white;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        
        #click-button {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 24px;
            padding: 30px 60px;
            margin: 20px 0;
            cursor: pointer;
            background-color: black;
            color: black;
            border: 2px solid white;
        }
        
        #click-button:hover {
            background-color: white;
            color: black;
        }
        
        .upgrade {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            background-color: black;
            color: black;
            border: 2px solid white;
            display: block;
            width: 100%;
            text-align: left;
        }
        
        .upgrade:hover {
            background-color: white;
            color: black;
        }
        
        .upgrade:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        h1, h2 {
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>MY HOVER CLICKER GAME</h1>
    
    <h2>Points: <span id="points">0</span></h2>
    <h2>Points Per Click: <span id="click-value">1</span></h2>
    
    <button id="click-button">CLICK ME</button>
    
    <h2>UPGRADES</h2>
    
    <button class="upgrade" id="double-upgrade">
        Double Click Value - Cost: <span id="double-cost">10</span>
    </button>
    <button class="upgrade" id="auto-upgrade">
    Auto-Clicker (+<span id="auto-value">1</span>/sec) - Cost: <span id="auto-cost">50</span> - Owned: <span id="auto-owned">0</span>
</button>

    
    <script>
        // Game variables
        let points = 0;
        let clickValue = 1;
        let doubleCost = 10;
        let autoClickerCost = 50;
        let autoClickerOwned = 0;
        let autoClickerValue = 1;

        
        // Get elements
        const pointsDisplay = document.getElementById('points');
        const clickValueDisplay = document.getElementById('click-value');
        const clickButton = document.getElementById('click-button');
        const doubleUpgrade = document.getElementById('double-upgrade');
        const doubleCostDisplay = document.getElementById('double-cost');
        const autoUpgrade = document.getElementById('auto-upgrade');
const autoCostDisplay = document.getElementById('auto-cost');
const autoOwnedDisplay = document.getElementById('auto-owned');
const autoValueDisplay = document.getElementById('auto-value');

        
        // Click button function
clickButton.addEventListener('click', function(event) {
    points = points + clickValue;
    updateDisplay();
    createSparkles(event);
});

        
        // Double upgrade function
         doubleUpgrade.addEventListener('click', function() {
            if (points >= doubleCost) {
                points = points - doubleCost;
                // Linear Logic: Increase click power by 2 for every purchase
               doubleCost = Math.floor(doubleCost * 1.5);
                updateDisplay();
            }
        });
        
        // Auto-clicker upgrade function
autoUpgrade.addEventListener('click', function() {
    if (points >= autoClickerCost) {
        points = points - autoClickerCost;
        autoClickerOwned = autoClickerOwned + 1;
        // Linear Logic: Auto-clicker strength grows by 2 per owned unit
        autoClickerValue = autoClickerOwned * 2; 
        // Exponential formula: New Cost = Old Cost * Growth Rate
        autoClickerCost = Math.floor(autoClickerCost * 1.20);
        updateDisplay();
    }
});

        // Create sparkles function
function createSparkles(event) {
    const colors = ['#F2E505', '#030302', '#F70505'];
    const sparkleCount = 50;
    
    for (let i = 0; i < sparkleCount; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        
        // Random color from our array
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        sparkle.style.backgroundColor = randomColor;
        
        // Position at click location
        sparkle.style.left = event.pageX + 'px';
        sparkle.style.top = event.pageY + 'px';
        
        // Random horizontal spread
        const randomX = (Math.random() - 0.5) * 100;
        sparkle.style.setProperty('--randomX', randomX + 'px');
        
        document.body.appendChild(sparkle);
        
        // Remove sparkle after animation
        setTimeout(function() {
            sparkle.remove();
        }, 1000);
    }
}

        
        // Update display function
        function updateDisplay() {
            pointsDisplay.textContent = points;
            clickValueDisplay.textContent = clickValue;
            doubleCostDisplay.textContent = doubleCost;
            
            autoCostDisplay.textContent = autoClickerCost;
autoOwnedDisplay.textContent = autoClickerOwned;
autoValueDisplay.textContent = autoClickerValue;

//Then UPDATE the button disable section to include the auto-clicker:
// Disable upgrade button if not enough points
if (points < doubleCost) {
    doubleUpgrade.disabled = true;
} else {
    doubleUpgrade.disabled = false;
}

if (points < autoClickerCost) {
    autoUpgrade.disabled = true;
} else {
    autoUpgrade.disabled = false;
}

            
            // Disable upgrade button if not enough points
            if (points < doubleCost) {
                doubleUpgrade.disabled = true;
            } else {
                doubleUpgrade.disabled = false;
            }
        }
        
        // Initialize display
        updateDisplay();
        // Auto-clicker timer
setInterval(function() {
    if (autoClickerOwned > 0) {
        points = points + (autoClickerOwned * autoClickerValue);
        updateDisplay();
    }
}, 1000);

    </script>
</body>
</html>
